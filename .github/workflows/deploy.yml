name: Deploy

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          source: "."
          target: "${{ secrets.DEPLOY_PATH }}"
          rm: false
          overwrite: true
          strip_components: 0
          exclude: |
            .git
            backend/bin
            backend/obj
            backend.Tests/bin
            backend.Tests/obj
            frontend/node_modules
            frontend/dist

      - name: Build and restart containers
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          port: ${{ secrets.DEPLOY_PORT }}
          envs: APP_POSTGRES_PASSWORD
          script_stop: true
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            if [ -z "$APP_POSTGRES_PASSWORD" ]; then
              echo "POSTGRES_PASSWORD secret is required"
              exit 1
            fi

            if [ ! -f .env ]; then
              cat > .env <<ENVEOF
            POSTGRES_DB=xml_generator
            POSTGRES_USER=xml_generator
            POSTGRES_PASSWORD=$APP_POSTGRES_PASSWORD
            POSTGRES_BIND_HOST=127.0.0.1
            POSTGRES_PORT=5432

            BACKEND_BIND_HOST=127.0.0.1
            BACKEND_PORT=5287
            FRONTEND_PORT=8083
            ASPNETCORE_ENVIRONMENT=Production
            ENVEOF
            fi

            docker compose config >/dev/null
            docker compose build
            docker compose up -d --remove-orphans
            docker compose ps
