services:
  db:
    image: postgres:17-alpine
    container_name: xml-generator-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xml_generator}
      POSTGRES_USER: ${POSTGRES_USER:-xml_generator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xml_generator_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: xml-generator-backend
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-xml_generator};Username=${POSTGRES_USER:-xml_generator};Password=${POSTGRES_PASSWORD:-xml_generator_password}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-5287}:8080"

  frontend:
    container_name: xml-generator-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres-data:
